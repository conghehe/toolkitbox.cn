<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>在线字数统计器 - 实时统计中英文字数/字符/段落 | Word Counter</title><meta name="description" content="免费在线字数统计工具，支持中英文混合统计。实时显示总字数、字符数、段落数、行数。兼容微信/微博/小红书字数限制检测。"><meta name="keywords" content="字数统计,字符统计,段落统计,在线字数,word counter,微信字数,微博字数"><link rel="canonical" href="https://toolkitbox.cn/word-counter/"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3563043653255879" crossorigin="anonymous"></script><style>:root{--bg:#fff;--t:#1a1a2e;--t2:#636e72;--p:#6c5ce7;--g:#00b894;--b:#e9ecef;--s:0 2px 12px rgba(0,0,0,.06)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f5f7fa,#e8ecf1);color:var(--t);min-height:100vh}.header{background:var(--bg);padding:10px 24px;border-bottom:1px solid var(--b)}.header a{color:var(--p);text-decoration:none;font-weight:600}.container{max-width:800px;margin:0 auto;padding:20px}h1{text-align:center;font-size:1.5rem;margin:10px 0}.sub{text-align:center;color:var(--t2);margin-bottom:20px;font-size:.9rem}.card{background:var(--bg);border-radius:14px;padding:24px;box-shadow:var(--s);margin-bottom:16px}.card textarea{width:100%;min-height:200px;padding:16px;border:2px solid var(--b);border-radius:12px;font-size:.9rem;font-family:inherit;resize:vertical;outline:none;background:var(--bg);color:var(--t);line-height:1.8}.card textarea:focus{border-color:var(--p)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:12px}@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr)}}.stat-item{background:linear-gradient(135deg,#f0edff,#e8eaf6);padding:16px;border-radius:10px;text-align:center}.stat-item .num{font-size:1.8rem;font-weight:800;color:var(--p)}.stat-item .label{font-size:.75rem;color:var(--t2);margin-top:2px}.limits{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}.limit-item{flex:1;min-width:200px;background:var(--bg);border-radius:10px;padding:14px;box-shadow:var(--s)}.limit-item .platform{font-weight:600;font-size:.85rem;margin-bottom:6px}.limit-item .bar-bg{height:8px;background:var(--b);border-radius:4px;overflow:hidden}.limit-item .bar-fill{height:100%;border-radius:4px;transition:width .3s}.limit-item .info{font-size:.75rem;color:var(--t2);margin-top:4px}.footer{text-align:center;padding:20px;color:var(--t2);font-size:.75rem}</style></head><body><header class="header"><a href="/">🧰 ToolkitBox</a> / 📝 字数统计器</header><div class="container"><h1>📝 在线字数统计器</h1><p class="sub">实时统计 · 中英文混合 · 微信/微博/小红书字数检测</p><div class="card"><textarea id="text" placeholder="粘贴或输入文本...&#10;&#10;支持中英文混合统计" oninput="update()">你好世界 Hello World！这是一段中英文混合测试文本。</textarea></div><div class="stats"><div class="stat-item"><div class="num" id="chars">0</div><div class="label">总字符数</div></div><div class="stat-item"><div class="num" id="words">0</div><div class="label">中文字数</div></div><div class="stat-item"><div class="num" id="lines">0</div><div class="label">行数</div></div><div class="stat-item"><div class="num" id="paras">0</div><div class="label">段落数</div></div></div><div class="limits"><div class="limit-item"><div class="platform">🔵 微博 (140字限制)</div><div class="bar-bg"><div class="bar-fill" id="weibo-bar" style="width:0;background:var(--p)"></div></div><div class="info">已用：<b id="weibo-used">0</b> / 140</div></div><div class="limit-item"><div class="platform">🟢 微信朋友圈</div><div class="info">建议：<b>200-300</b>字最佳，你当前 <b id="wechat-count">0</b> 字</div></div><div class="limit-item"><div class="platform">🔴 小红书 (1000字)</div><div class="bar-bg"><div class="bar-fill" id="xhs-bar" style="width:0;background:#ff6b6b"></div></div><div class="info">已用：<b id="xhs-used">0</b> / 1000</div></div></div></div><footer class="footer"><p>字数统计器 | 数据在浏览器本地处理 | &copy; 2026 ToolkitBox</p></footer><ins class="adsbygoogle" style="display:block;min-height:0;max-height:0;overflow:hidden" data-ad-client="ca-pub-3563043653255879" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script><script>function update(){var t=document.getElementById('text').value;var chars=t.length;var cn=t.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g);var cnCount=cn?cn.length:0;var lines=t.split('\n').length;var paras=t.split('\n').filter(function(l){return l.trim().length>0}).length;document.getElementById('chars').textContent=chars;document.getElementById('words').textContent=cnCount;document.getElementById('lines').textContent=lines;document.getElementById('paras').textContent=paras;var wb=Math.min(100,Math.round(cnCount/140*100));document.getElementById('weibo-bar').style.width=wb+'%';document.getElementById('weibo-used').textContent=cnCount;document.getElementById('wechat-count').textContent=cnCount;var xh=Math.min(100,Math.round(cnCount/1000*100));document.getElementById('xhs-bar').style.width=xh+'%';document.getElementById('xhs-used').textContent=cnCount}update();</script><script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"在线字数统计器"}</script></body></html>
