const CATS = ["全部","对话助手","写作工具","图像生成","视频生成","音频工具","编程开发","办公效率","设计工具"];
const PRICES = {free:"免费",freemium:"免费增值",paid:"付费"};

let activeCat = "全部";

function init() {
  let btns = '';
  CATS.forEach(c => {
    btns += '<button class="cat-btn'+(c===activeCat?' active':'')+'" onclick="filterCat(\''+c+'\')">'+c+'</button>';
  });
  document.getElementById('catButtons').innerHTML=btns;
  document.getElementById('statsInfo').innerHTML = '共 <b>'+TOOLS.length+'</b> 款工具 · 7 个分类 · 每日更新';
  document.querySelector('.hero p').textContent = '收录 '+TOOLS.length+' 款实用 AI 工具，覆盖 7 大分类，快速找到你需要的';
  render();
}

function filterCat(c) {
  activeCat = c;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.textContent===c));
  render();
}

function render() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  let filtered = TOOLS;
  if(activeCat !== '全部') filtered = filtered.filter(t=>t.c===activeCat);
  if(q) filtered = filtered.filter(t=>t.n.toLowerCase().includes(q)||t.d.toLowerCase().includes(q)||t.t.some(tag=>tag.toLowerCase().includes(q))||t.c.includes(q));

  document.getElementById('statsInfo').innerHTML = '共 <b>'+TOOLS.length+'</b> 款工具 · 筛选结果 <b>'+filtered.length+'</b> 款 · 每日更新';

  let html = '';
  if(filtered.length===0) {
    html = '<div class="empty"><p>😕 没找到匹配的工具</p><p style="color:var(--t2);font-size:.85rem">试试其他关键词或分类</p></div>';
  } else {
    filtered.forEach(t=>{
      html += '<div class="card"><h3><a href="'+t.u+'" target="_blank" rel="nofollow">'+t.n+'</a></h3>';
      html += '<p class="desc">'+t.d+'</p>';
      html += '<div class="meta"><span class="price-tag price-'+t.p+'">'+PRICES[t.p]+'</span>';
      html += '<span class="cat-tag">'+t.c+'</span>';
      html += '</div></div>';
    });
  }
  document.getElementById('toolGrid').innerHTML = html;
}

init();
</script>
