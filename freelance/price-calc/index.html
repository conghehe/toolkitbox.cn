<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>项目报价计算器 - 独立开发者接单报价工具</title>
<meta name="description" content="自由职业者项目报价计算器：根据项目类型/工时/难度/市场需求智能计算合理报价。支持网站/APP/小程序/设计/咨询等多种项目类型。">
<link rel="canonical" href="https://toolkitbox.cn/freelance/price-calc/">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3563043653255879" crossorigin="anonymous"></script>
<style>
:root{--bg:#fff;--t:#1a1a2e;--t2:#636e72;--p:#74b9ff;--b:#e9ecef}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#e8f4fd,#dff0ff);color:var(--t);min-height:100vh}
.nav{text-align:center;padding:10px;background:#fff;border-bottom:1px solid var(--b)}.nav a{color:var(--p);text-decoration:none;font-size:.85rem}
.tool{max-width:700px;margin:0 auto;padding:30px 20px}
h1{text-align:center;font-size:1.5rem;color:#2d3436;margin-bottom:8px}
.sub{text-align:center;color:var(--t2);margin-bottom:24px}
.card{background:var(--bg);border-radius:16px;padding:28px;box-shadow:0 2px 16px rgba(0,0,0,.06);border:1px solid var(--b)}
label{display:block;font-size:.85rem;font-weight:600;margin:12px 0 6px}
select,input{width:100%;padding:10px 14px;border:1.5px solid var(--b);border-radius:8px;font-size:.9rem}
select:focus,input:focus{outline:none;border-color:var(--p)}
.row{display:flex;gap:14px}.row>*{flex:1}
.result{margin-top:24px;padding:20px;background:linear-gradient(135deg,#74b9ff,#a29bfe);border-radius:12px;color:#fff;text-align:center}
.result .price{font-size:2.4rem;font-weight:900;margin:8px 0}
.result .range{font-size:.85rem;opacity:.8}
.btn{display:block;width:100%;padding:12px;margin-top:16px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:.95rem;cursor:pointer;font-weight:600}
</style>
<script>var _hmt=_hmt||[];(function(){var hm=document.createElement("script");hm.src="https://hm.baidu.com/hm.js?c5a1030cb241158e01e441524cb07216";var s=document.getElementsByTagName("script")[0];s.parentNode.insertBefore(hm,s)})();</script>
</head>
<body>
<div class="nav"><a href="/freelance/">← 独立开发者工具</a> | <a href="/">工具箱矩阵</a></div>
<div class="tool">
<h1>项目报价计算器</h1>
<p class="sub">输入项目参数，智能计算合理报价区间</p>
<div class="card">
<label>项目类型</label>
<select id="type">
<option value="web">网站开发</option><option value="app">移动APP</option>
<option value="miniapp">微信小程序</option><option value="design">UI设计</option>
<option value="consult">技术咨询</option><option value="api">API开发</option>
</select>
<div class="row">
<div><label>预估工时(天)</label><input type="number" id="days" value="15" min="1" max="365"></div>
<div><label>日薪(元)</label><input type="number" id="rate" value="800" min="300" max="3000"></div>
</div>
<div class="row">
<div><label>复杂度</label><select id="complexity"><option value="1">简单</option><option value="1.3" selected>中等</option><option value="1.6">复杂</option></select></div>
<div><label>紧急程度</label><select id="urgent"><option value="1" selected>正常</option><option value="1.2">加急(+20%)</option><option value="1.5">特急(+50%)</option></select></div>
</div>
<button class="btn" onclick="calc()">计算报价</button>
<div class="result" id="result" style="display:none">
<p>建议报价</p>
<div class="price" id="price">-</div>
<p class="range" id="range">-</p>
</div>
</div>
</div>
<script>
function calc(){
  var days=parseFloat(document.getElementById('days').value)||15;
  var rate=parseFloat(document.getElementById('rate').value)||800;
  var comp=parseFloat(document.getElementById('complexity').value)||1;
  var urg=parseFloat(document.getElementById('urgent').value)||1;
  var base=days*rate*comp*urg;
  var low=Math.round(base*0.85);
  var high=Math.round(base*1.15);
  document.getElementById('price').textContent='¥'+low.toLocaleString()+' - ¥'+high.toLocaleString();
  document.getElementById('range').textContent='日均约 ¥'+Math.round(low/days).toLocaleString();
  document.getElementById('result').style.display='block';
}
</script>
</body>
</html>
