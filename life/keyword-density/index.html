<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关键词密度检测器 - ToolkitBox</title>
  <meta name="description" content="免费在线关键词密度检测工具，分析网页或文本的关键词出现频率和密度，优化SEO效果。">
  <link rel="canonical" href="https://toolkitbox.cn/keyword-density/">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3563043653255879" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box }
    body { font-family: -apple-system, "PingFang SC", sans-serif; background: #f5f7fa; color: #1a1a2e; min-height: 100vh; padding: 20px }
    .container { max-width: 900px; margin: 0 auto }
    h1 { text-align: center; color: #6c5ce7; margin-bottom: 8px }
    .subtitle { text-align: center; color: #636e72; margin-bottom: 30px }
    .input-group { margin-bottom: 20px }
    textarea { width: 100%; height: 200px; padding: 12px; border: 2px solid #e9ecef; border-radius: 10px; font-size: 1rem; resize: vertical }
    textarea:focus { outline: none; border-color: #6c5ce7 }
    .options { display: flex; gap: 15px; margin-bottom: 20px; align-items: center }
    input[type="text"] { padding: 10px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; width: 200px }
    input[type="text"]:focus { outline: none; border-color: #6c5ce7 }
    button { padding: 12px 24px; background: #6c5ce7; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 600 }
    button:hover { background: #5a4bd1 }
    .results { background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-top: 20px }
    .keyword-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #e9ecef }
    .keyword-item:last-child { border-bottom: none }
    .keyword { font-weight: 600; color: #6c5ce7 }
    .count { color: #636e72 }
    .density { color: #00b894; font-weight: 600 }
    .back { display: inline-block; margin-top: 20px; color: #6c5ce7; text-decoration: none }
    .ads { margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 8px; text-align: center }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 关键词密度检测器</h1>
    <p class="subtitle">分析文本关键词出现频率和密度，优化SEO效果</p>
    
    <div class="input-group">
      <textarea id="textInput" placeholder="粘贴文章内容或输入文本..."></textarea>
    </div>
    
    <div class="options">
      <label>排除常用词：<input type="checkbox" id="excludeCommon" checked></label>
      <label>最小长度：<input type="number" id="minLength" value="3" min="1" max="10" style="width:60px"></label>
      <button onclick="analyze()">分析密度</button>
    </div>
    
    <div id="results" class="results" style="display:none">
      <h3 style="margin-bottom: 16px; color: #6c5ce7">📊 分析结果</h3>
      <div id="keywordList"></div>
      <div id="stats" style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px">
        <div>总词数：<strong id="totalWords">0</strong></div>
        <div>唯一词数：<strong id="uniqueWords">0</strong></div>
        <div>关键词数：<strong id="keywordCount">0</strong></div>
      </div>
    </div>
    
    <div class="ads">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-3563043653255879"
           data-ad-slot="auto"
           data-ad-format="auto"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    
    <a href="/" class="back">← 返回 ToolkitBox</a>
  </div>
  
  <script>
    const commonWords = ['的', '了', '在', '是', '我', '有', '和', '就', '不', '人', '都', '一', '一个', '上', '也', '很', '到', '说', '要', '去', '你', '会', '着', '没有', '看', '好', '自己', '这', 'the', 'a', 'an', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by', 'from', 'as', 'is', 'was', 'are', 'were', 'be', 'been', 'have', 'has', 'had', 'do', 'does', 'did', 'will', 'would', 'should', 'could', 'may', 'might', 'must', 'shall'];
    
    function analyze() {
      const text = document.getElementById('textInput').value.trim();
      if (!text) { alert('请输入文本'); return; }
      
      const excludeCommon = document.getElementById('excludeCommon').checked;
      const minLength = parseInt(document.getElementById('minLength').value) || 3;
      
      // 分词（简单按空格和标点分割）
      const words = text.toLowerCase()
        .replace(/[^\w\s\u4e00-\u9fff]/g, ' ')
        .split(/\s+/)
        .filter(w => w.length >= minLength);
      
      if (excludeCommon) {
        words = words.filter(w => !commonWords.includes(w));
      }
      
      // 统计词频
      const freq = {};
      words.forEach(w => { freq[w] = (freq[w] || 0) + 1; });
      
      // 排序
      const sorted = Object.entries(freq)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 50);
      
      const totalWords = words.length;
      const uniqueWords = sorted.length;
      
      // 显示结果
      const keywordListHtml = sorted.map(([word, count]) => {
        const density = ((count / totalWords) * 100).toFixed(2);
        return `
          <div class="keyword-item">
            <span class="keyword">${word}</span>
            <span class="count">出现 ${count} 次</span>
            <span class="density">密度 ${density}%</span>
          </div>
        `;
      }).join('');
      
      document.getElementById('keywordList').innerHTML = keywordListHtml;
      document.getElementById('totalWords').textContent = totalWords;
      document.getElementById('uniqueWords').textContent = uniqueWords;
      document.getElementById('keywordCount').textContent = sorted.filter(([w, c]) => c > 1).length;
      document.getElementById('results').style.display = 'block';
    }
  </script>
</body>
</html>
