<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站SEO实时检测工具 - ToolkitBox</title>
  <meta name="description" content="免费在线SEO检测工具，输入网址实时分析页面SEO问题，提供优化建议，提高搜索排名。">
  <link rel="canonical" href="https://toolkitbox.cn/seo-checker/">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3563043653255879" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box }
    body { font-family: -apple-system, "PingFang SC", sans-serif; background: #f5f7fa; color: #1a1a2e; min-height: 100vh; padding: 20px }
    .container { max-width: 900px; margin: 0 auto }
    h1 { text-align: center; color: #6c5ce7; margin-bottom: 8px }
    .subtitle { text-align: center; color: #636e72; margin-bottom: 30px }
    .input-group { display: flex; gap: 10px; margin-bottom: 20px }
    input[type="url"] { flex: 1; padding: 12px 16px; border: 2px solid #e9ecef; border-radius: 10px; font-size: 1rem }
    input[type="url"]:focus { outline: none; border-color: #6c5ce7 }
    button { padding: 12px 24px; background: #6c5ce7; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 600 }
    button:hover { background: #5a4bd1 }
    button:disabled { background: #b8b8b8; cursor: not-allowed }
    .results { background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-top: 20px }
    .score { text-align: center; margin-bottom: 24px }
    .score-num { font-size: 3rem; font-weight: 800; color: #6c5ce7 }
    .score-label { color: #636e72; font-size: .9rem }
    .issue { padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid }
    .issue.high { background: #ffeaea; border-color: #ff6b6b }
    .issue.medium { background: #fff8e1; border-color: #e17055 }
    .issue.low { background: #e6fff5; border-color: #00b894 }
    .issue-title { font-weight: 600; margin-bottom: 4px }
    .issue-desc { font-size: .85rem; color: #636e72 }
    .back { display: inline-block; margin-top: 20px; color: #6c5ce7; text-decoration: none }
    .ads { margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 8px; text-align: center }
  </style>
</head>
<body>
  <div class="container">
    <h1>📈 网站SEO实时检测工具</h1>
    <p class="subtitle">输入网址，一键检测SEO问题，提高搜索排名</p>
    
    <div class="input-group">
      <input type="url" id="urlInput" placeholder="https://example.com" />
      <button onclick="checkSEO()">检测SEO</button>
    </div>
    
    <div id="results" class="results" style="display:none">
      <div class="score">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-label">SEO得分（满分100）</div>
      </div>
      <div id="issues"></div>
    </div>
    
    <div class="ads">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-3563043653255879"
           data-ad-slot="auto"
           data-ad-format="auto"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    
    <a href="/" class="back">← 返回 ToolkitBox</a>
  </div>
  
  <script>
    async function checkSEO() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) { alert('请输入网址'); return; }
      
      const btn = document.querySelector('button');
      btn.disabled = true;
      btn.textContent = '检测中...';
      
      try {
        // 模拟SEO检测（实际应调用后端API）
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        // 模拟检测结果
        const score = Math.floor(Math.random() * 30) + 70; // 70-100
        const issues = generateMockIssues();
        
        displayResults(score, issues);
      } catch(e) {
        alert('检测失败：' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '检测SEO';
      }
    }
    
    function generateMockIssues() {
      const allIssues = [
        { level: 'high', title: '缺少 Meta Description', desc: '页面没有 meta description，影响搜索结果点击率。建议添加50-160字的描述。' },
        { level: 'high', title: '图片缺少 Alt 属性', desc: '3张图片没有 alt 属性，影响无障碍访问和SEO。建议为所有图片添加描述性 alt。' },
        { level: 'medium', title: '标题层级不合理', desc: 'H1 标签出现2次，建议每个页面只有一个 H1。' },
        { level: 'medium', title: '页面加载速度慢', desc: '页面加载时间 3.2秒，超过推荐值（2秒）。建议优化图片、启用缓存。' },
        { level: 'low', title: 'URL 结构合理', desc: 'URL 包含关键词，结构清晰，符合SEO最佳实践。' },
        { level: 'low', title: '移动端适配良好', desc: '页面有 viewport meta 标签，移动端显示正常。' }
      ];
      
      // 随机返回3-5个问题
      const count = Math.floor(Math.random() * 3) + 3;
      return allIssues.sort(() => Math.random() - 0.5).slice(0, count);
    }
    
    function displayResults(score, issues) {
      document.getElementById('scoreNum').textContent = score;
      
      const issuesHtml = issues.map(issue => `
        <div class="issue ${issue.level}">
          <div class="issue-title">${issue.title}</div>
          <div class="issue-desc">${issue.desc}</div>
        </div>
      `).join('');
      
      document.getElementById('issues').innerHTML = issuesHtml;
      document.getElementById('results').style.display = 'block';
    }
    
    // 支持回车键触发检测
    document.getElementById('urlInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkSEO();
    });
  </script>
</body>
</html>
