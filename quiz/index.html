<style>:root{--bg:#fff;--t:#1a1a2e;--t2:#636e72;--p:#6c5ce7;--g:#00b894;--r:#ff6b6b;--b:#e9ecef;--s:0 2px 12px rgba(0,0,0,.06)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f3e5f5,#e8eaf6);color:var(--t);min-height:100vh}.header{background:var(--bg);padding:12px 24px;border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100}.header a{color:var(--p);text-decoration:none;font-weight:600}.container{max-width:800px;margin:0 auto;padding:20px}h1{text-align:center;font-size:1.6rem;margin:10px 0;color:#7b1fa2}.sub{text-align:center;color:var(--t2);margin-bottom:20px}.card{background:var(--bg);border-radius:12px;padding:20px;box-shadow:var(--s);margin-bottom:14px}.card h3{font-size:.9rem;margin-bottom:12px;color:#7b1fa2}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:500px){.row{grid-template-columns:1fr}}.fg{margin-bottom:10px}.fg label{display:block;font-size:.8rem;font-weight:600;margin-bottom:3px;color:var(--t2)}.fg input,.fg select,.fg textarea{width:100%;padding:8px 12px;border:1.5px solid var(--b);border-radius:8px;font-size:.85rem;outline:none;background:var(--bg);color:var(--t)}.fg input:focus,.fg textarea:focus{border-color:var(--p)}.btn{padding:10px 20px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.85rem;transition:.2s}.btn-p{background:var(--p);color:#fff}.btn-p:hover{opacity:.9}.btn-out{background:transparent;border:1.5px solid var(--b);color:var(--t)}.btn-g{background:var(--g);color:#fff}.quiz-q{margin:8px 0;padding:10px;background:var(--bg);border-radius:8px;box-shadow:var(--s);font-size:.85rem}.quiz-q .q-title{font-weight:600;color:var(--p)}.quiz-q .q-opt{margin-left:16px;color:var(--t2);font-size:.82rem}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.preview-card{background:linear-gradient(135deg,#f3e5f5,#ede7f6);border-radius:12px;padding:20px;margin-top:16px}.footer{text-align:center;padding:20px;color:var(--t2);font-size:.75rem}</style></head><body>
<header class="header"><a href="/">🧰 ToolkitBox</a> / 📝 测验生成器</header>
<div class="container"><h1>📝 在线测验生成器</h1><p class="sub">快速创建选择题/判断题 · 实时预览 · JSON 导出</p>
<div class="card"><h3>📋 创建题目</h3>
<div class="fg"><label>题目内容</label><textarea id="question" rows="2" placeholder="请输入题目..."></textarea></div>
<div class="fg"><label>题目类型</label><select id="qtype"><option value="choice">🔘 单选题</option><option value="judge">✅ 判断题</option></select></div>
<div id="optionsBox"><div class="fg"><label>选项（每行一个，第一项为正确答案）</label><textarea id="options" rows="4" placeholder="巴黎&#10;伦敦&#10;东京&#10;纽约"></textarea></div></div>
<div class="toolbar"><button class="btn btn-p" onclick="addQuestion()">➕ 添加题目</button><button class="btn btn-g" onclick="previewQuiz()">👁️ 预览</button><button class="btn btn-out" onclick="exportJSON()">📥 导出JSON</button><button class="btn btn-out" onclick="clearAll()">🗑️ 清空</button></div></div>
<div class="card"><h3>📄 已添加题目 (<span id="qCount">0</span>)</h3><div id="questionList" style="color:var(--t2);font-size:.85rem">还没有题目，开始创建吧</div></div>
<div id="previewArea"></div>
<div class="card" style="font-size:.82rem;line-height:1.8;color:var(--t2)"><b>🎯 适用场景：</b>课堂测验 · 培训考核 · 问卷调查 · 知识竞赛 · 社群互动 · HR面试题库</div></div>
<footer class="footer"><p>测验生成器 | 数据在浏览器本地处理 | &copy; 2026 ToolkitBox</p></footer>

<script>
let quiz=[];
function addQuestion(){const q=document.getElementById('question').value.trim();const t=document.getElementById('qtype').value;const o=(document.getElementById('options').value||'').split('\n').filter(l=>l.trim());if(!q){alert('请输入题目');return}if(t==='choice'&&o.length<2){alert('单选题至少需要2个选项');return}quiz.push({question:q,type:t,options:t==='choice'?o:['正确','错误'],answer:t==='choice'?o[0]:'正确'});document.getElementById('question').value='';document.getElementById('options').value='';updateList()}
function updateList(){document.getElementById('qCount').textContent=quiz.length;let h='';quiz.forEach((q,i)=>{h+='<div class=\"quiz-q\"><div class=\"q-title\">'+(i+1)+'. ['+(q.type==='choice'?'单选':'判断')+'] '+q.question+'</div>';q.options.forEach(o=>{h+='<div class=\"q-opt\">'+(o===q.answer?'● ':'○ ')+o+'</div>'});h+='</div>'});document.getElementById('questionList').innerHTML=h||'还没有题目'}
function previewQuiz(){let h='<div class=\"preview-card\"><h3 style=\"color:#7b1fa2;margin-bottom:12px\">📋 测验预览 (共'+quiz.length+'题)</h3>';quiz.forEach((q,i)=>{h+='<div style=\"margin:12px 0;font-size:.9rem\"><b>'+(i+1)+'. '+q.question+'</b> ('+(q.type==='choice'?'单选':'判断')+')</div>';q.options.forEach((o,j)=>{h+='<div style=\"margin:4px 0 4px 20px;font-size:.85rem\">'+String.fromCharCode(65+j)+'. '+o+'</div>'})});h+='</div>';document.getElementById('previewArea').innerHTML=h}
function exportJSON(){if(!quiz.length){alert('没有题目');return}const blob=new Blob([JSON.stringify(quiz,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='quiz.json';a.click()}
function clearAll(){quiz=[];updateList();document.getElementById('previewArea').innerHTML=''}
document.getElementById('qtype').addEventListener('change',function(){document.getElementById('optionsBox').style.display=this.value==='judge'?'none':'block'})
</script>
