<script>
const PLATFORMS={taobao:{n:'淘宝/天猫',rate:0.04,fix:0},pdd:{n:'拼多多',rate:0.006,fix:0},douyin:{n:'抖音电商',rate:0.03,fix:0.02},jd:{n:'京东',rate:0.06,fix:0},amazon:{n:'亚马逊FBA',rate:0.12,fix:15}};
function calc(){const p=document.getElementById('platform').value;const price=parseFloat(document.getElementById('price').value)||0;const cost=parseFloat(document.getElementById('cost').value)||0;const ship=parseFloat(document.getElementById('shipping').value)||0;const adsPct=(parseFloat(document.getElementById('ads').value)||0)/100;const retPct=(parseFloat(document.getElementById('returns').value)||0)/100;
const pl=PLATFORMS[p];const fee=price*pl.rate+pl.fix;const ads=price*adsPct;const net=price-cost-ship-fee-ads;const netAfterRet=net*(1-retPct);const margin=price>0?Math.round(netAfterRet/price*100):0;
document.getElementById('profitColor').textContent='¥'+netAfterRet.toFixed(2);
document.getElementById('profitColor').className='big '+(netAfterRet>=0?'green':'red');
document.getElementById('revenue').textContent='¥'+price.toFixed(2);
document.getElementById('fee').textContent='¥'+fee.toFixed(2);
document.getElementById('margin').textContent=margin+'%';
document.getElementById('month100').textContent='¥'+(netAfterRet*100).toFixed(0);
document.getElementById('month1000').textContent='¥'+(netAfterRet*1000).toFixed(0)}
function buildCompare(){const price=99,cost=40,ship=5,ads=9.9;let h='';let best='',bestVal=-Infinity;for(const[k,v]of Object.entries(PLATFORMS)){const fee=price*v.rate+v.fix;const net=price-cost-ship-fee-ads;const m=Math.round(net/price*100);if(net>bestVal){bestVal=net;best=k}h+='<tr><td>'+v.n+'</td><td>'+(v.rate*100).toFixed(1)+'%'+(v.fix?'+'+v.fix:'')+'</td><td class=\"'+(k===best?'best':'')+'\">¥'+net.toFixed(1)+'</td><td>'+(k===best?'🏆':'')+' '+m+'%</td><td>¥'+(net*500).toFixed(0)+'</td></tr>'}document.getElementById('compareBody').innerHTML=h}
calc();buildCompare();
</script>
