<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>IP查询工具 - 在线查IP地址/归属地/运营商 | IP Lookup</title><meta name="description" content="免费在线IP地址查询工具，自动获取当前公网IP、归属地、运营商。支持手动输入IP查询。"><meta name="keywords" content="IP查询,IP地址,公网IP,归属地查询,what is my ip,IP定位,运营商查询"><link rel="canonical" href="https://toolkitbox.cn/ip-lookup/"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3563043653255879" crossorigin="anonymous"></script><style>:root{--bg:#fff;--t:#1a1a2e;--t2:#636e72;--p:#6c5ce7;--g:#00b894;--b:#e9ecef;--s:0 2px 12px rgba(0,0,0,.06)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f5f7fa,#e8ecf1);color:var(--t);min-height:100vh}.header{background:var(--bg);padding:10px 24px;border-bottom:1px solid var(--b)}.header a{color:var(--p);text-decoration:none;font-weight:600}.container{max-width:600px;margin:0 auto;padding:20px}h1{text-align:center;font-size:1.5rem;margin:10px 0}.card{background:var(--bg);border-radius:14px;padding:24px;box-shadow:var(--s);margin-bottom:14px}.my-ip{text-align:center;padding:20px}.my-ip .ip{font-size:2.5rem;font-weight:800;color:var(--p);font-family:monospace;margin:10px 0}.my-ip .info{font-size:.9rem;color:var(--t2)}.row{display:flex;gap:10px}.row input{flex:1;padding:10px 14px;border:1.5px solid var(--b);border-radius:10px;font-size:.9rem;outline:none;font-family:monospace}.row input:focus{border-color:var(--p)}.btn{padding:10px 20px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.85rem;background:var(--p);color:#fff;white-space:nowrap}.btn:hover{opacity:.9}.result-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--b);font-size:.85rem}.result-row .label{color:var(--t2);font-weight:600}.footer{text-align:center;padding:20px;color:var(--t2);font-size:.75rem}</style></head><body><header class="header"><a href="/">🧰 ToolkitBox</a> / 🌐 IP 查询</header><div class="container"><h1>🌐 IP 地址查询</h1><div class="card" id="myIpCard"><div class="my-ip"><div style="font-size:.85rem;color:var(--t2)">你的公网 IP</div><div class="ip" id="myip">查询中...</div><div class="info" id="myinfo"></div></div></div><div class="card"><h3 style="font-size:.9rem;margin-bottom:12px">🔍 查询其他 IP</h3><div class="row"><input type="text" id="queryIp" placeholder="输入 IP 地址...（如 8.8.8.8）" pattern="[0-9.]*"><button class="btn" onclick="lookupIP()">查询</button></div><div id="queryResult" style="margin-top:12px"></div></div></div><footer class="footer"><p>IP查询工具 | 数据来源 ip-api.com | &copy; 2026 ToolkitBox</p></footer><ins class="adsbygoogle" style="display:block;min-height:0;max-height:0;overflow:hidden" data-ad-client="ca-pub-3563043653255879" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script><script>function showResult(data,prefix){var h='<div class="result-row"><span class="label">IP</span><span>'+data.query+'</span></div>';h+='<div class="result-row"><span class="label">国家/地区</span><span>'+data.country+' '+data.countryCode+'</span></div>';h+='<div class="result-row"><span class="label">城市</span><span>'+data.city+'</span></div>';h+='<div class="result-row"><span class="label">运营商</span><span>'+data.isp+'</span></div>';h+='<div class="result-row"><span class="label">时区</span><span>'+data.timezone+'</span></div>';h+='<div class="result-row"><span class="label">经纬度</span><span>'+data.lat+', '+data.lon+'</span></div>';document.getElementById(prefix==='my'?'myinfo':'queryResult').innerHTML=prefix==='my'?data.city+', '+data.country+' · '+data.isp:h}function loadMyIP(){fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>{document.getElementById('myip').textContent=d.ip;fetch('http://ip-api.com/json/'+d.ip+'?lang=zh-CN&fields=query,country,countryCode,city,isp,timezone,lat,lon').then(r=>r.json()).then(showResult)})}function lookupIP(){var ip=document.getElementById('queryIp').value.trim();if(!ip){alert('请输入IP地址');return}document.getElementById('queryResult').innerHTML='查询中...';fetch('http://ip-api.com/json/'+ip+'?lang=zh-CN&fields=query,country,countryCode,city,isp,timezone,lat,lon').then(r=>r.json()).then(function(d){if(d.status==='fail'){document.getElementById('queryResult').innerHTML='<p style="color:red">查询失败: '+d.message+'</p>';return}showResult(d,'query')}).catch(function(){document.getElementById('queryResult').innerHTML='<p style="color:red">网络错误，请稍后重试</p>'})}loadMyIP();</script></body></html>
