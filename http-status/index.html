<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HTTP状态码查询 - 1xx/2xx/3xx/4xx/5xx完整参考表 | HTTP Status Codes</title><meta name="description" content="HTTP状态码完整参考表，包含1xx-5xx所有标准状态码。每个状态码附带中英文说明、使用场景和示例。开发调试和API接口必备。"><meta name="keywords" content="HTTP状态码,HTTP Status Codes,200,301,404,500,API状态码,REST状态码,HTTP响应码,网络状态码"><link rel="canonical" href="https://toolkitbox.cn/http-status/"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3563043653255879" crossorigin="anonymous"></script><style>:root{--bg:#fff;--t:#1a1a2e;--t2:#636e72;--p:#6c5ce7;--g:#00b894;--o:#e17055;--r:#ff6b6b;--b:#e9ecef;--s:0 2px 12px rgba(0,0,0,.06)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f5f7fa,#e8ecf1);color:var(--t);min-height:100vh}.header{background:var(--bg);padding:10px 24px;border-bottom:1px solid var(--b)}.header a{color:var(--p);text-decoration:none;font-weight:600}.container{max-width:900px;margin:0 auto;padding:20px}h1{text-align:center;font-size:1.5rem;margin:10px 0}.sub{text-align:center;color:var(--t2);margin-bottom:20px;font-size:.9rem}.cat-title{font-size:1.1rem;font-weight:700;padding:10px 16px;margin:20px 0 10px;border-radius:10px;display:flex;align-items:center;gap:8px}table{width:100%;border-collapse:collapse;background:var(--bg);border-radius:12px;overflow:hidden;box-shadow:var(--s);font-size:.85rem}th{background:#f8f9fc;padding:10px 14px;text-align:left;font-weight:600;font-size:.78rem}td{padding:10px 14px;border-bottom:1px solid var(--b)}tr:hover{background:#f8f9fc}td:first-child{font-family:monospace;font-weight:700;font-size:1rem;color:var(--p);white-space:nowrap}.badge{padding:2px 8px;border-radius:6px;font-size:.7rem;font-weight:600}.b-info{background:#dbeafe;color:#2563eb}.b-success{background:#e6fff5;color:var(--g)}.b-redirect{background:#fef3c7;color:#d97706}.b-client{background:#ffeaea;color:var(--r)}.b-server{background:#f3e8ff;color:#9333ea}.search{width:100%;max-width:400px;margin:0 auto 20px;display:block;padding:10px 16px;border:2px solid var(--b);border-radius:10px;font-size:.9rem;outline:none;background:var(--bg);color:var(--t)}.search:focus{border-color:var(--p)}.footer{text-align:center;padding:20px;color:var(--t2);font-size:.75rem}@media(max-width:600px){td:nth-child(3),th:nth-child(3){display:none}}</style><script>var _hmt=_hmt||[];(function(){var hm=document.createElement("script");hm.src="https://hm.baidu.com/hm.js?c5a1030cb241158e01e441524cb07216";var s=document.getElementsByTagName("script")[0];s.parentNode.insertBefore(hm,s)})();</script>
</head><body><header class="header"><a href="/">🧰 ToolkitBox</a> / 🌐 HTTP 状态码</header><div class="container"><h1>🌐 HTTP 状态码参考表</h1><p class="sub">1xx-5xx 完整标准状态码 · 中英文说明 · 使用场景 · 按分类浏览</p><input class="search" type="text" id="search" placeholder="搜索状态码或关键词...（如：404, 重定向, error）" oninput="filter()"><div id="codes"></div></div><footer class="footer"><p>HTTP状态码参考 | IANA/HTTP标准 | &copy; 2026 ToolkitBox</p></footer><ins class="adsbygoogle" style="display:block;min-height:0;max-height:0;overflow:hidden" data-ad-client="ca-pub-3563043653255879" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script><script>
var CODES=[
  {c:100,n:'Continue',cn:'继续',d:'客户端应继续请求。服务器已收到请求头，客户端应发送请求体。',cat:'info',badge:'信息'},
  {c:101,n:'Switching Protocols',cn:'切换协议',d:'服务器同意切换协议。WebSocket升级时使用。',cat:'info',badge:'信息'},
  {c:200,n:'OK',cn:'成功',d:'请求成功。GET返回资源，POST返回处理结果。最常用的成功状态码。',cat:'success',badge:'成功'},
  {c:201,n:'Created',cn:'已创建',d:'请求成功并创建了新资源。POST创建后返回，Location头指向新资源。',cat:'success',badge:'成功'},
  {c:204,n:'No Content',cn:'无内容',d:'请求成功但无返回内容。常见于DELETE或PUT确认操作。',cat:'success',badge:'成功'},
  {c:206,n:'Partial Content',cn:'部分内容',d:'请求部分资源成功。常用于断点续传、视频seek。',cat:'success',badge:'成功'},
  {c:301,n:'Moved Permanently',cn:'永久重定向',d:'资源已永久移动到新URL。浏览器和搜索引擎会更新为新地址。SEO常用。',cat:'redirect',badge:'重定向'},
  {c:302,n:'Found',cn:'临时重定向',d:'资源临时移动。浏览器跳转但搜索引擎保持原URL索引。',cat:'redirect',badge:'重定向'},
  {c:304,n:'Not Modified',cn:'未修改',d:'资源未修改，使用缓存版本。浏览器缓存验证成功时返回。',cat:'redirect',badge:'缓存'},
  {c:307,n:'Temporary Redirect',cn:'临时重定向',d:'类似302，但保证请求方法不变（POST保持POST）。',cat:'redirect',badge:'重定向'},
  {c:308,n:'Permanent Redirect',cn:'永久重定向',d:'类似301，但保证请求方法不变。',cat:'redirect',badge:'重定向'},
  {c:400,n:'Bad Request',cn:'错误请求',d:'服务器无法理解请求。通常是参数格式错误或请求体损坏。',cat:'client',badge:'客户端错误'},
  {c:401,n:'Unauthorized',cn:'未授权',d:'需要身份验证。未登录或token过期。返回WWW-Authenticate头。',cat:'client',badge:'客户端错误'},
  {c:403,n:'Forbidden',cn:'禁止访问',d:'服务器理解请求但拒绝执行。已认证但无权限。权限不足。',cat:'client',badge:'客户端错误'},
  {c:404,n:'Not Found',cn:'未找到',d:'请求的资源不存在。最著名的HTTP状态码。URL错误或资源已删除。',cat:'client',badge:'客户端错误'},
  {c:405,n:'Method Not Allowed',cn:'方法不允许',d:'该URL不支持当前HTTP方法。如对只读端点使用POST。',cat:'client',badge:'客户端错误'},
  {c:408,n:'Request Timeout',cn:'请求超时',d:'服务器等待请求超时。客户端发送请求太慢。',cat:'client',badge:'客户端错误'},
  {c:409,n:'Conflict',cn:'冲突',d:'请求与资源当前状态冲突。如并发编辑、版本冲突。',cat:'client',badge:'客户端错误'},
  {c:410,n:'Gone',cn:'已删除',d:'资源已永久删除且无转发地址。比404更强，告诉爬虫立即删除索引。',cat:'client',badge:'客户端错误'},
  {c:413,n:'Payload Too Large',cn:'请求体过大',d:'请求体超过服务器限制。上传文件过大时触发。',cat:'client',badge:'客户端错误'},
  {c:414,n:'URI Too Long',cn:'URI过长',d:'URL长度超过服务器限制。通常GET参数过多导致。',cat:'client',badge:'客户端错误'},
  {c:415,n:'Unsupported Media Type',cn:'不支持的媒体类型',d:'Content-Type不被支持。如服务器只接受application/json但发送了text/xml。',cat:'client',badge:'客户端错误'},
  {c:422,n:'Unprocessable Entity',cn:'无法处理的实体',d:'请求格式正确但语义错误。如缺少必填字段、验证失败。WebDAV/REST API常用。',cat:'client',badge:'客户端错误'},
  {c:429,n:'Too Many Requests',cn:'请求过多',d:'请求频率超过限制。触发Rate Limiting。包含Retry-After头。',cat:'client',badge:'客户端错误'},
  {c:500,n:'Internal Server Error',cn:'服务器内部错误',d:'服务器遇到了意外情况。代码bug、配置错误、未捕获异常。',cat:'server',badge:'服务端错误'},
  {c:502,n:'Bad Gateway',cn:'网关错误',d:'作为网关/代理的服务器从上游收到无效响应。Nginx常用。',cat:'server',badge:'服务端错误'},
  {c:503,n:'Service Unavailable',cn:'服务不可用',d:'服务器暂时无法处理请求。维护中或过载。包含Retry-After头。',cat:'server',badge:'服务端错误'},
  {c:504,n:'Gateway Timeout',cn:'网关超时',d:'作为网关的服务器未及时从上游收到响应。常见于微服务调用链。',cat:'server',badge:'服务端错误'},
];

function render(data){
  var cats={info:'📘 1xx 信息响应',success:'✅ 2xx 成功',redirect:'🔄 3xx 重定向',client:'❌ 4xx 客户端错误',server:'🚨 5xx 服务端错误'};
  var html='';var last='';
  data.forEach(function(c){
    if(c.cat!==last){if(last)html+='</table>';last=c.cat;var bg=c.cat==='info'?'#dbeafe':c.cat==='success'?'#e6fff5':c.cat==='redirect'?'#fef3c7':c.cat==='client'?'#ffeaea':'#f3e8ff';html+='<div class="cat-title" style="background:'+bg+'">'+cats[c.cat]+'</div><table><tr><th>状态码</th><th>英文</th><th>中文</th><th>说明</th></tr>'}
    var bd=c.cat==='info'?'b-info':c.cat==='success'?'b-success':c.cat==='redirect'?'b-redirect':c.cat==='client'?'b-client':'b-server';
    html+='<tr><td>'+c.c+' <span class="badge '+bd+'">'+c.badge+'</span></td><td>'+c.n+'</td><td>'+c.cn+'</td><td>'+c.d+'</td></tr>';
  });
  html+='</table>';document.getElementById('codes').innerHTML=html;
}

function filter(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  var f=q?CODES.filter(function(c){return String(c.c).includes(q)||c.n.toLowerCase().includes(q)||c.cn.includes(q)||c.d.includes(q)}):CODES;
  render(f);
}
render(CODES);
</script><script type="application/ld+json">{"@context":"https://schema.org","@type":"DefinedTermSet","name":"HTTP状态码参考"}</script></body></html>
